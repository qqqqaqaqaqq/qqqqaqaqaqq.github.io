name: Vite React 사이트를 GitHub Pages에 배포

on:
  push:
    branches: ["main"] # main 브랜치 푸시 시 동작
  workflow_dispatch:    # 수동 실행 가능

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1. 레포지토리 체크아웃
      - name: 코드 불러오기
        uses: actions/checkout@v4

      # 2. Node.js 설치
      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      # 3. 패키지 설치
      - name: 의존성 설치
        run: npm ci

      # 4. 빌드 (404.html 자동 복사 포함)
      - name: 빌드
        run: npm run build && cp dist/index.html dist/404.html

      # 5. 아티팩트 업로드
      - name: 빌드 결과 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      # 6. GitHub Pages에 배포
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
